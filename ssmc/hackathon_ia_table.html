<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 해커톤 IA Table</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f3; font-size: 13px; }

header {
  background: #111; color: #fff;
  padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 200;
}
.h-dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; }
header h1 { font-size: 14px; font-weight: 600; }
.h-badge { margin-left: auto; font-size: 11px; color: #888; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 3px 10px; }

.toolbar {
  background: #fff; border-bottom: 1px solid rgba(0,0,0,0.08);
  padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  position: sticky; top: 49px; z-index: 100;
}
.filter-group { display: flex; gap: 4px; align-items: center; }
.filter-label { font-size: 11px; color: #999; margin-right: 4px; }
.filter-btn {
  font-size: 11px; font-family: 'Noto Sans KR', sans-serif;
  padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.12);
  background: #fff; cursor: pointer; font-weight: 500; color: #555; transition: all .15s;
}
.filter-btn:hover { border-color: #10b981; color: #10b981; }
.filter-btn.active { background: #111; color: #fff; border-color: #111; }
.sep { width: 1px; height: 20px; background: rgba(0,0,0,0.1); margin: 0 4px; }
.count-badge { font-size: 11px; color: #aaa; margin-left: auto; }

.table-wrap { padding: 16px 12px 60px; overflow-x: auto; }

table {
  width: 100%; border-collapse: collapse;
  background: #fff; border-radius: 12px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  min-width: 1000px;
}
thead th {
  background: #111; color: #fff;
  padding: 10px 12px; text-align: left;
  font-size: 11px; font-weight: 600; letter-spacing: .04em;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid rgba(0,0,0,0.05); transition: background .1s; }
tbody tr:hover { background: #fafaf8; }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 7px 12px; vertical-align: middle; line-height: 1.4; }

/* 구분 badges */
.badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 20px; white-space: nowrap;
}
.badge-front  { background: #e1f5ee; color: #0f6e56; }
.badge-admin  { background: #eeedfe; color: #3c3489; }
.badge-sysadmin { background: #f1f0eb; color: #444441; }

/* Target badges */
.target {
  display: inline-block; font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap;
}
.target-participant { background: #e1f5ee; color: #085041; }
.target-peer        { background: #eaf3de; color: #27500a; }
.target-judge       { background: #faeeda; color: #633806; }
.target-operator    { background: #eeedfe; color: #3c3489; }
.target-sysadmin    { background: #f1f0eb; color: #5f5e5a; }

/* Depth cells */
.d1 { font-weight: 600; color: #111; }
.d2 { color: #333; }
.d3 { color: #555; }
.d4 { color: #777; font-size: 11px; }
td.empty { color: #ddd; }

/* Login */
.login-o { color: #059669; font-weight: 700; }
.login-x { color: #dc2626; font-weight: 700; }

/* Note */
.note { color: #888; font-size: 11px; }

/* P2 */
.p2 { font-size: 9px; font-weight: 700; background: #7f77dd; color: #fff; border-radius: 3px; padding: 1px 4px; margin-left: 3px; vertical-align: middle; }
.new { font-size: 9px; font-weight: 700; background: #fb2c36; color: #fff; border-radius: 3px; padding: 1px 4px; margin-left: 3px; vertical-align: middle; }

/* Row highlight by phase */
tr.phase-common  { border-left: 3px solid #d1d0c9; }
tr.phase-before  { border-left: 3px solid #10b981; }
tr.phase-during  { border-left: 3px solid #7f77dd; }
tr.phase-after   { border-left: 3px solid #ba7517; }
tr.phase-system  { border-left: 3px solid #a32d2d; }

.hidden { display: none !important; }
</style>
</head>

<header>
  <div class="h-dot"></div>

  <span class="h-badge">v0.2 · depth 4단계</span>
</header>

<div class="toolbar">
  <div class="filter-group">
    <span class="filter-label">구분</span>

  <div class="sep"></div>
  <div class="filter-group">
    <span class="filter-label">대상</span>

    <button class="filter-btn" onclick="setFilter('target','시스템관리자')">시스템관리자</button>
  </div>
  <span class="count-badge" id="rowCount"></span>
</div>

<div class="table-wrap">
<table id="iaTable">
<thead>

    <th style="width:70px">로그인</th>

  </tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

const targetClass = {
  '참가자':'participant','동료평가자':'peer','심사위원':'judge','운영자':'operator','시스템관리자':'sysadmin'
};
const gbLabel = { 'Front':'Front','Admin':'Admin','SystemAdmin':'SystemAdmin' };
const gbBadge = { 'Front':'badge-front','Admin':'badge-admin','SystemAdmin':'badge-sysadmin' };

let filterGb = 'all', filterTarget = 'all';

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let count = 0;
  rows.forEach(r => {
    const gbMatch = filterGb === 'all' || r.gb === filterGb;
    const tMatch  = filterTarget === 'all' || r.target === filterTarget;
    if (!gbMatch || !tMatch) return;
    count++;
    const tr = document.createElement('tr');
    tr.className = 'phase-' + r.phase;
    const noteHtml = r.note.includes('[P2]') || r.note.includes('Phase 2')
      ? r.note.replace(/Phase 2/g, '<span class="p2">P2</span>')
      : r.note.includes('NEW')
      ? r.note.replace(/NEW/g, '<span class="new">NEW</span>')
      : r.note;
    tr.innerHTML = `
      <td><span class="badge ${gbBadge[r.gb]}">${r.gb}</span></td>
      <td><span class="target target-${targetClass[r.target]}">${r.target}</span></td>
      <td class="d1">${r.d1}</td>
      <td class="d2">${r.d2 || '<span style="color:#e5e5e5">—</span>'}</td>
      <td class="d3">${r.d3 || '<span style="color:#e5e5e5">—</span>'}</td>
      <td class="d4">${r.d4 || '<span style="color:#e5e5e5">—</span>'}</td>
      <td class="${r.login==='O'?'login-o':'login-x'}">${r.login}</td>
      <td class="note">${noteHtml}</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('rowCount').textContent = `${count}개 항목`;
}

function setFilter(type, val) {
  if (type === '구분') {
    filterGb = val;
    document.querySelectorAll('.filter-group:nth-child(1) .filter-btn').forEach(b => b.classList.remove('active'));
  } else {
    filterTarget = val;
    document.querySelectorAll('.filter-group:nth-child(3) .filter-btn').forEach(b => b.classList.remove('active'));
  }
  event.target.classList.add('active');
  render();
}

render();

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 해커톤 IA Table v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f3; font-size: 13px; color: #1a1a1a; }

header {
  background: #111; color: #fff;
  padding: 15px 24px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 200;
}
.h-dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; flex-shrink: 0; }
header h1 { font-size: 14px; font-weight: 600; }
.h-badge { margin-left: auto; font-size: 11px; color: #888; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 3px 10px; white-space: nowrap; }

.toolbar {
  background: #fff; border-bottom: 1px solid rgba(0,0,0,0.08);
  padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  position: sticky; top: 49px; z-index: 100;
}
.filter-label { font-size: 11px; color: #999; margin-right: 2px; white-space: nowrap; }
.filter-btn {
  font-size: 11px; font-family: 'Noto Sans KR', sans-serif;
  padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.12);
  background: #fff; cursor: pointer; font-weight: 500; color: #555; transition: all .15s;
}
.filter-btn:hover { border-color: #10b981; color: #10b981; }
.filter-btn.active { background: #111; color: #fff; border-color: #111; }
.sep { width: 1px; height: 18px; background: rgba(0,0,0,0.1); margin: 0 2px; }
.count-badge { font-size: 11px; color: #aaa; margin-left: auto; white-space: nowrap; }

.table-wrap { padding: 14px 12px 60px; overflow-x: auto; }

table {
  width: 100%; border-collapse: collapse;
  background: #fff; border-radius: 12px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  min-width: 900px;
}
thead th {
  background: #111; color: #fff;
  padding: 10px 12px; text-align: left;
  font-size: 11px; font-weight: 600; letter-spacing: .04em;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid rgba(0,0,0,0.05); transition: background .1s; }
tbody tr:hover { background: #fafaf8; }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 7px 12px; vertical-align: middle; line-height: 1.5; }

/* depth 들여쓰기 */
.d1 { font-weight: 600; color: #111; }
.d2 { padding-left: 14px; color: #333; }
.d3 { padding-left: 28px; color: #555; }
.d4 { padding-left: 42px; color: #777; font-size: 11.5px; }
td.dash { color: #e0e0e0; }

/* 구분 badge */
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.badge-front   { background: #e1f5ee; color: #0f6e56; }
.badge-admin   { background: #eeedfe; color: #3c3489; }

/* target badge */
.target { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
.target-참가자     { background: #e1f5ee; color: #085041; }
.target-동료       { background: #eaf3de; color: #27500a; }
.target-심사       { background: #faeeda; color: #633806; }
.target-운영자     { background: #eeedfe; color: #3c3489; }
.target-시스템관리자 { background: #f1f0eb; color: #5f5e5a; }

/* login */
.login-o { color: #059669; font-weight: 700; text-align: center; }
.login-x { color: #dc2626; font-weight: 700; text-align: center; }

.note { color: #777; font-size: 11px; line-height: 1.45; }

/* depth별 왼쪽 컬러 */
tr.gb-front   { border-left: 3px solid #10b981; }
tr.gb-admin   { border-left: 3px solid #7f77dd; }
</style>
</head>
<body>

<header>
  <div class="h-dot"></div>
  <h1>AI 해커톤 플랫폼 — IA Table</h1>
  <span class="h-badge">v2 · 고객 확정안 기반</span>
</header>

<div class="toolbar">
  <span class="filter-label">구분</span>
  <button class="filter-btn active" onclick="setFilter('gb','all',this)">전체</button>
  <button class="filter-btn" onclick="setFilter('gb','Front',this)">Front</button>
  <button class="filter-btn" onclick="setFilter('gb','Admin',this)">Admin</button>
  <div class="sep"></div>
  <span class="filter-label">Target</span>
  <button class="filter-btn active" onclick="setFilter('tg','all',this)">전체</button>
  <button class="filter-btn" onclick="setFilter('tg','참가자',this)">참가자</button>
  <button class="filter-btn" onclick="setFilter('tg','동료',this)">동료평가자</button>
  <button class="filter-btn" onclick="setFilter('tg','심사',this)">심사위원</button>
  <button class="filter-btn" onclick="setFilter('tg','운영자',this)">운영자</button>
  <button class="filter-btn" onclick="setFilter('tg','시스템관리자',this)">시스템관리자</button>
  <span class="count-badge" id="rowCount"></span>
</div>

<div class="table-wrap">
<table>
<thead>
  <tr>
    <th style="width:72px">구분</th>
    <th style="width:88px">Target</th>
    <th style="width:130px">1Depth</th>
    <th style="width:150px">2Depth</th>
    <th style="width:150px">3Depth</th>
    <th style="width:130px">4Depth</th>
    <th style="width:60px">로그인</th>
    <th>비고</th>
  </tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>

  // ── Admin / 운영자 ──
  {gb:'Admin',tg:'운영자',d1:'대시보드',d2:'',d3:'',d4:'',login:'O',note:'전체 운영 모니터링 현황 (참가팀, 점수, 랭킹, 심사위원 참여현황 등)'},
  {gb:'Admin',tg:'운영자',d1:'대회설정',d2:'',d3:'',d4:'',login:'O',note:''},
  {gb:'Admin',tg:'운영자',d1:'',d2:'일정설정',d3:'',d4:'',login:'O',note:''},
  {gb:'Admin',tg:'운영자',d1:'',d2:'공지사항',d3:'',d4:'',login:'O',note:''},

  {gb:'Admin',tg:'운영자',d1:'',d2:'가중치 설정',d3:'',d4:'',login:'O',note:''},
  {gb:'Admin',tg:'운영자',d1:'',d2:'갤러리 목록',d3:'',d4:'',login:'O',note:'등록된 결과물 순위 확인 등'},
  {gb:'Admin',tg:'운영자',d1:'',d2:'',d3:'상세',d4:'',login:'O',note:'노출여부, 다운로드파일 확인 등'},

  {gb:'Admin',tg:'운영자',d1:'',d2:'',d3:'',d4:'동료평가 확인',login:'O',note:'확인완료 후 심사완료처리'},
  {gb:'Admin',tg:'운영자',d1:'사용자관리',d2:'참가자(팀)',d3:'',d4:'',login:'O',note:''},
  {gb:'Admin',tg:'운영자',d1:'',d2:'',d3:'상세',d4:'',login:'O',note:'참가자 (팀) 정보 확인'},

  {gb:'Admin',tg:'시스템관리자',d1:'',d2:'상세',d3:'',d4:'',login:'O',note:''},
  {gb:'Admin',tg:'시스템관리자',d1:'사용자 권한관리',d2:'',d3:'',d4:'',login:'O',note:''},

  {gb:'Admin',tg:'시스템관리자',d1:'',d2:'상세',d3:'',d4:'',login:'O',note:''},

const targetClass = {
  '참가자':'참가자','동료':'동료','심사':'심사','운영자':'운영자','시스템관리자':'시스템관리자'
};
const targetLabel = {
  '참가자':'참가자','동료':'동료평가자','심사':'심사위원','운영자':'운영자','시스템관리자':'시스템관리자'
};

let fGb = 'all', fTg = 'all';

function depthCell(val, cls) {
  if (!val) return `<td class="dash">—</td>`;
  return `<td class="${cls}">${val}</td>`;
}

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let count = 0;
  data.forEach(r => {
    if (fGb !== 'all' && r.gb !== fGb) return;
    if (fTg !== 'all' && r.tg !== fTg) return;
    count++;
    const tr = document.createElement('tr');
    tr.className = `gb-${r.gb.toLowerCase()}`;
    tr.innerHTML = `
      <td><span class="badge badge-${r.gb.toLowerCase()}">${r.gb}</span></td>
      <td><span class="target target-${targetClass[r.tg]}">${targetLabel[r.tg]}</span></td>
      ${depthCell(r.d1,'d1')}
      ${depthCell(r.d2,'d2')}
      ${depthCell(r.d3,'d3')}
      ${depthCell(r.d4,'d4')}
      <td class="${r.login==='O'?'login-o':'login-x'}">${r.login}</td>
      <td class="note">${r.note}</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('rowCount').textContent = `${count}개 항목`;
}

function setFilter(type, val, btn) {
  if (type === 'gb') {
    fGb = val;
    document.querySelectorAll('.toolbar .filter-btn').forEach((b,i) => { if(i<3) b.classList.remove('active'); });
  } else {
    fTg = val;
    document.querySelectorAll('.toolbar .filter-btn').forEach((b,i) => { if(i>=3) b.classList.remove('active'); });
  }
  btn.classList.add('active');
  render();
}

render();
</script>
</body>
</html>

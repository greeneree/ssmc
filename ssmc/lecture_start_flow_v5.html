<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강의 시작 프로세스 v5</title>
<style>
  :root {
    --bg: #0d1117;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 720px;
    margin-bottom: 32px;
  }
  h1 { font-size: 12px; font-weight: 400; color: #7d8590; letter-spacing: 0.12em; text-transform: uppercase; }
  .ver { font-size: 11px; color: #30363d; }
</style>
</head>
<body>
<div class="header">
  <h1>강의 시작 프로세스 — 계정 배정 + 예약 로직</h1>
  <span class="ver">v5</span>
</div>

<svg width="100%" viewBox="0 0 680 1060" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="a"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#2ea87e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#bc8cff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- ────────────── 메인 수직 플로우 (x=240~440 center=340) ────────────── -->

<!-- ① 실시간 강의 시작 -->
<rect x="220" y="20" width="240" height="46" rx="8" fill="rgba(46,168,126,0.12)" stroke="#2ea87e" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="13" font-weight="500" fill="#4ade80" x="340" y="48" text-anchor="middle">실시간 강의 시작</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#30363d" x="214" y="44" text-anchor="end">①</text>

<line x1="340" y1="66" x2="340" y2="100" stroke="#30363d" stroke-width="1" marker-end="url(#a)"/>

<!-- ② 시작/종료시간 입력 -->
<rect x="205" y="100" width="270" height="52" rx="8" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#58a6ff" x="340" y="121" text-anchor="middle">시작시간 / 종료시간 입력</text>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#7d8590" x="340" y="139" text-anchor="middle">당일 예약 — 종료시간 필수</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#30363d" x="198" y="122" text-anchor="end">②</text>

<line x1="340" y1="152" x2="340" y2="186" stroke="#30363d" stroke-width="1" marker-end="url(#a)"/>

<!-- ③ timetable overlap 체크 -->
<polygon points="340,186 460,242 340,298 220,242" fill="rgba(180,83,9,0.10)" stroke="#f59e0b" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" fill="#f59e0b" x="340" y="234" text-anchor="middle">index 낮은 순 계정</text>
<text font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" fill="#f59e0b" x="340" y="250" text-anchor="middle">시간대 겹침?</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#7d8590" x="340" y="264" text-anchor="middle">요청시작 &lt; 기존종료 AND 요청종료 &gt; 기존시작</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#30363d" x="214" y="208" text-anchor="end">③</text>

<!-- ③ Y (겹침) → 아래 -->
<line x1="340" y1="298" x2="340" y2="336" stroke="#30363d" stroke-width="1" marker-end="url(#a)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="352" y="320" text-anchor="start">Y</text>

<!-- ⑥ 다음 계정 가용? -->
<polygon points="340,336 450,386 340,436 230,386" fill="rgba(180,83,9,0.10)" stroke="#f59e0b" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" fill="#f59e0b" x="340" y="379" text-anchor="middle">다음 계정</text>
<text font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" fill="#f59e0b" x="340" y="395" text-anchor="middle">가용 있음?</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#30363d" x="222" y="358" text-anchor="end">⑥</text>

<!-- ⑥ Y → 루프 왼쪽으로 ③으로 복귀 -->
<line x1="230" y1="386" x2="170" y2="386" stroke="#f59e0b" stroke-width="1"/>
<line x1="170" y1="386" x2="170" y2="214" stroke="#f59e0b" stroke-width="1"/>
<line x1="170" y1="214" x2="218" y2="214" stroke="#f59e0b" stroke-width="1" marker-end="url(#a)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="168" y="380" text-anchor="end">Y</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#7d8590" x="155" y="305" text-anchor="end">다음</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#7d8590" x="155" y="317" text-anchor="end">계정</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#7d8590" x="155" y="329" text-anchor="end">재시도</text>

<!-- ⑥ N → 아래 -->
<line x1="340" y1="436" x2="340" y2="474" stroke="#30363d" stroke-width="1" marker-end="url(#a)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="352" y="458" text-anchor="start">N</text>

<!-- ⑦ 무료 계정 생성 가능? -->
<polygon points="340,474 450,524 340,574 230,524" fill="rgba(180,83,9,0.10)" stroke="#f59e0b" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" fill="#f59e0b" x="340" y="517" text-anchor="middle">무료 계정</text>
<text font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" fill="#f59e0b" x="340" y="533" text-anchor="middle">생성 가능?</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#30363d" x="222" y="496" text-anchor="end">⑦</text>

<!-- ⑦ N → 아래 → 관리자 알림 -->
<line x1="340" y1="574" x2="340" y2="612" stroke="#ef4444" stroke-width="1" marker-end="url(#ar)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="352" y="596" text-anchor="start">N</text>
<rect x="220" y="612" width="240" height="64" rx="8" fill="rgba(185,28,28,0.10)" stroke="#ef4444" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#ef4444" x="340" y="634" text-anchor="middle">관리자 알림 발송</text>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#7d8590" x="340" y="650" text-anchor="middle">모든 계정 사용 중</text>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#7d8590" x="340" y="664" text-anchor="middle">예약 불가</text>
<line x1="340" y1="676" x2="340" y2="702" stroke="#ef4444" stroke-width="1" marker-end="url(#ar)"/>
<circle cx="340" cy="716" r="14" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#ef4444" x="340" y="720" text-anchor="middle">End</text>

<!-- ⑦ Y → 왼쪽 → index DB 등록 → 강의 진행 -->
<line x1="230" y1="524" x2="150" y2="524" stroke="#2ea87e" stroke-width="1" marker-end="url(#at)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="190" y="516" text-anchor="middle">Y</text>
<rect x="20" y="498" width="130" height="52" rx="8" fill="rgba(46,168,126,0.10)" stroke="#2ea87e" stroke-width="1"/>

<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#7d8590" x="85" y="535" text-anchor="middle">생성 계정 저장</text>
<line x1="85" y1="550" x2="85" y2="584" stroke="#2ea87e" stroke-width="1" marker-end="url(#at)"/>
<rect x="20" y="584" width="130" height="44" rx="8" fill="rgba(26,127,37,0.12)" stroke="#3fb950" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#3fb950" x="85" y="611" text-anchor="middle">강의 진행</text>
<line x1="85" y1="628" x2="85" y2="652" stroke="#3fb950" stroke-width="1" marker-end="url(#ag)"/>
<circle cx="85" cy="666" r="14" fill="rgba(63,185,80,0.08)" stroke="#3fb950" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#3fb950" x="85" y="670" text-anchor="middle">End</text>

<!-- ────────────── ③ N 분기: 오른쪽 배정 성공 플로우 ────────────── -->

<!-- ③ N → 오른쪽 계정 배정 -->
<line x1="460" y1="242" x2="524" y2="242" stroke="#3fb950" stroke-width="1" marker-end="url(#ag)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="492" y="234" text-anchor="middle">N</text>
<rect x="524" y="216" width="132" height="52" rx="8" fill="rgba(26,127,37,0.12)" stroke="#3fb950" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#3fb950" x="590" y="236" text-anchor="middle">계정 배정</text>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#7d8590" x="590" y="252" text-anchor="middle">timetable 등록</text>

<line x1="590" y1="268" x2="590" y2="306" stroke="#3fb950" stroke-width="1" marker-end="url(#ag)"/>

<!-- ④ 실제 시작 시점 type=live 재확인 -->
<polygon points="590,306 660,352 590,398 520,352" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="500" fill="#58a6ff" x="590" y="344" text-anchor="middle">실제 시작 시점</text>
<text font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="500" fill="#58a6ff" x="590" y="358" text-anchor="middle">여전히 사용 중?</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#7d8590" x="590" y="372" text-anchor="middle">type=live 확인</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#30363d" x="514" y="326" text-anchor="end">④</text>

<!-- ④ N → 강의 진행 → End -->
<line x1="590" y1="398" x2="590" y2="436" stroke="#3fb950" stroke-width="1" marker-end="url(#ag)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="602" y="420" text-anchor="start">N</text>
<rect x="524" y="436" width="132" height="44" rx="8" fill="rgba(26,127,37,0.12)" stroke="#3fb950" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#3fb950" x="590" y="463" text-anchor="middle">강의 진행</text>
<line x1="590" y1="480" x2="590" y2="506" stroke="#3fb950" stroke-width="1" marker-end="url(#ag)"/>
<circle cx="590" cy="520" r="14" fill="rgba(63,185,80,0.08)" stroke="#3fb950" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#3fb950" x="590" y="524" text-anchor="middle">End</text>

<!-- ④ Y → 아래 -->
<line x1="590" y1="398" x2="590" y2="436" stroke="#30363d" stroke-width="0"/>
<!-- 실제로는 Y가 아래로 가는 경로 -->
<!-- ④ Y 분기: 다이아몬드 아래가 아니라 여기서 N이 아래, Y는 추가 분기 필요 -->
<!-- 위에서 N이 아래로 갔으므로, Y는 오른쪽으로 -->
<!-- 수정: ④ N=아래(강의진행), Y=오른쪽(⑤) -->

<!-- ④ Y → 오른쪽으로 ⑤ -->
<!-- 다이아몬드 오른꼭짓점은 x=660, y=352 -->
<!-- 하지만 이미 N이 아래로 선을 그었으니 Y를 왼쪽(x=520)으로 -->
<!-- 다이아몬드: 위=306, 오른=660, 아래=398, 왼=520 -->
<!-- N label이 아래에 있으면, Y는 왼쪽으로 -->
<!-- 왼쪽 꼭짓점: x=520, y=352 -->

<!-- 전체 재설계: N=오른쪽(배정성공시), Y=아래(여전히사용중) -->
<!-- 즉 ④의 N/Y를 바꾸자 -->
<!-- ④ 여전히 사용 중? N=아래(강의진행 바로), Y=아래쪽으로 ⑤ -->
<!-- 이미 N을 아래로 그렸으니, 별도 Y 경로를 그려야 한다 -->
<!-- ④ 다이아몬드 왼쪽 꼭짓점(520,352)에서 왼쪽으로 ⑤로 -->

<line x1="520" y1="352" x2="460" y2="352" stroke="#bc8cff" stroke-width="1" marker-end="url(#ap)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="490" y="344" text-anchor="middle">Y</text>

<!-- ⑤ 다음 예약 있음? -->
<polygon points="390,352 460,400 390,448 320,400" fill="rgba(188,140,255,0.08)" stroke="#bc8cff" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="500" fill="#bc8cff" x="390" y="393" text-anchor="middle">다음 예약</text>
<text font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="500" fill="#bc8cff" x="390" y="408" text-anchor="middle">있음?</text>
<text font-family="'IBM Plex Mono',monospace" font-size="9" fill="#30363d" x="314" y="370" text-anchor="end">⑤</text>

<!-- ⑤ Y → 아래 → 강사 채팅 알림 + 강제종료 -->
<line x1="390" y1="448" x2="390" y2="488" stroke="#ef4444" stroke-width="1" marker-end="url(#ar)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="402" y="472" text-anchor="start">Y</text>
<rect x="300" y="488" width="180" height="68" rx="8" fill="rgba(185,28,28,0.10)" stroke="#ef4444" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="500" fill="#ef4444" x="390" y="510" text-anchor="middle">강사 채팅 알림</text>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#7d8590" x="390" y="526" text-anchor="middle">종료 15분 / 5분 전 경고</text>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#7d8590" x="390" y="542" text-anchor="middle">→ 강제종료</text>

<circle cx="390" cy="596" r="14" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1"/>
<text font-family="'IBM Plex Mono',monospace" font-size="10" fill="#ef4444" x="390" y="600" text-anchor="middle">End</text>

<!-- ⑤ N → 위 → 자동연장 허용 -->
<line x1="390" y1="352" x2="390" y2="306" stroke="#2ea87e" stroke-width="1" marker-end="url(#at)"/>
<text font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7d8590" x="402" y="332" text-anchor="start">N</text>
